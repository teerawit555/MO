<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday TT Pixel Game</title>
  <style>
    body {
      margin: 0;
      font-family: monospace;
      background: linear-gradient(#f9a8d4, #e9d5ff);
      overflow-x: hidden;
      text-align: center;
    }
    .flowers { position: fixed; inset: 0; opacity: 0.25; pointer-events:none; font-size: 28px; }
    .container { max-width: 900px; margin: 20px auto; background: white; border: 4px solid #000; padding: 20px; box-shadow: 8px 8px 0 #000; position: relative; }
    .grid { display: grid; grid-template-columns: repeat(8, 56px); gap: 0; width: fit-content; margin: 16px auto; }
    .cell { width:56px; height:56px; border:2px solid #000; display:flex; align-items:center; justify-content:center; font-size:32px; background:#fff1f2; }
    .panel { border:4px solid #000; padding:12px; margin-top:16px; background:#ffe4e6; }
    button { border:2px solid #000; padding:8px 14px; background:white; cursor:pointer; }
    .ending { animation: pulse 1s infinite; }
    @keyframes pulse { 50% { transform: scale(1.02);} }
  </style>
</head>
<body>
  <div class="flowers">🌺 🌺 🌺 🌺 🌺 🌺 🌺 🌺 🌺 🌺 🌺 🌺 🌺 🌺</div>
  <div class="container">
    <h1>🎮 PIXEL BIRTHDAY QUEST 🎮</h1>
    <p id="message">🎮 พาหนุ่มพิกเซลไปหา TT กัน</p>
    <button onclick="toggleMusic()" id="musicBtn">🔇 Turn Music On</button>
    <p id="song"></p>
    <div id="grid" class="grid"></div>
    <p>🕹️ ใช้ปุ่มลูกศรเพื่อเดิน | ⭐ คะแนน: <span id="score">0</span></p>

    <div class="panel">
      <h3>🦋 Catch the Butterfly</h3>
      <button onclick="bonus('butterfly')">จับผีเสื้อ ✨</button>
    </div>

    <div class="panel">
      <h3>⭐ Wish Upon a Star</h3>
      <button onclick="bonus('star')">แตะดาว 🌟</button>
    </div>

    <div class="panel">
      <h3>🍰 Decorate the Cake</h3>
      <div style="font-size:48px">🎂🍓✨</div>
      <button onclick="bonus('cake')">ตกแต่งเค้ก 🎀</button>
    </div>

    <div id="ending" class="panel ending" style="display:none;">
      <div style="font-size:48px">🎆 💖 ⭐ 🎆</div>
      <p>พลุ หัวใจ และดาวลอยเต็มสวนดอกโบตั๋นเพื่อ TT</p>
    </div>
  </div>

  <script>
    const width = 8, height = 5;
    let player = {x:0,y:2};
    let cake = {x:3,y:1,collected:false};
    let gift = {x:6,y:3,collected:false};
    let girl = {x:7,y:2};
    let score = 0;
    let musicOn = false;

    function updateScore(v){ score += v; document.getElementById('score').textContent = score; }
    function setMessage(t){ document.getElementById('message').textContent = t; }

    function render(){
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for(let y=0;y<height;y++){
        for(let x=0;x<width;x++){
          const cell = document.createElement('div');
          cell.className = 'cell';
          let content = '▫️';
          if(x===girl.x && y===girl.y) content='👧';
          if(!cake.collected && x===cake.x && y===cake.y) content='🎂';
          if(!gift.collected && x===gift.x && y===gift.y) content='🎁';
          if(x===player.x && y===player.y) content='👦';
          cell.textContent = content;
          grid.appendChild(cell);
        }
      }
    }

    function checkGame(){
      if(!cake.collected && player.x===cake.x && player.y===cake.y){ cake.collected=true; updateScore(10); setMessage('🎂 ได้เค้กแล้ว ไปหาของขวัญต่อ!'); }
      if(!gift.collected && player.x===gift.x && player.y===gift.y){ gift.collected=true; updateScore(20); setMessage('🎁 เจอของขวัญแล้ว! ไปหา TT เร็ว'); }
      if(cake.collected && gift.collected && player.x===girl.x && player.y===girl.y){
        updateScore(50);
        setMessage('💖 Happy Birthday TT 💖 สวนดอกโบตั๋นนี้มีไว้ให้เธอคนเดียว');
        document.getElementById('ending').style.display='block';
      }
    }

    window.addEventListener('keydown', (e)=>{
      if(e.key==='ArrowLeft') player.x=Math.max(0,player.x-1);
      if(e.key==='ArrowRight') player.x=Math.min(width-1,player.x+1);
      if(e.key==='ArrowUp') player.y=Math.max(0,player.y-1);
      if(e.key==='ArrowDown') player.y=Math.min(height-1,player.y+1);
      checkGame();
      render();
    });

    function bonus(type){
      if(type==='butterfly'){ updateScore(15); setMessage('🦋 จับผีเสื้อแห่งความโชคดีได้!'); }
      if(type==='star'){ updateScore(15); setMessage('⭐ คำอธิษฐานของ TT จะเป็นจริง'); }
      if(type==='cake'){ updateScore(20); setMessage('🍰 เค้กของ TT ถูกตกแต่งจนสวยที่สุดแล้ว!'); }
    }

    function toggleMusic(){
      musicOn = !musicOn;
      document.getElementById('musicBtn').textContent = musicOn ? '🎵 Sweet Love Song On ♪' : '🔇 Turn Music On';
      document.getElementById('song').textContent = musicOn ? '🎶 You are my sweetest birthday star, TT ✨💖🎶' : '';
    }

    render();
  </script>
</body>
</html>
